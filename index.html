<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mood Music Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>Moods 🎧</h2>
    <button onclick="getMusic('happy')">Happy</button>
    <button onclick="getMusic('sad')">Sad</button>
    <button onclick="getMusic('party')">Party</button>
    <button onclick="getMusic('romantic')">Romantic</button>
  </div>

  <!-- Main -->
  <div class="main">
    <h1>Music Dashboard</h1>

    <!-- Search + Sort -->
    <input type="text" id="searchInput" placeholder="Search songs...">
    
    <select id="sortSelect">
      <option value="">Sort</option>
      <option value="asc">A → Z</option>
      <option value="desc">Z → A</option>
    </select>

    <p id="loading"></p>

    <div id="songs" class="songs"></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
